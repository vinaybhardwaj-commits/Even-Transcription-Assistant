name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies (npm install — repo has no lockfile; matches Vercel)
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest installed ephemerally — not a committed dep; same pattern as e2e's playwright)
        run: |
          npm i -D vitest@^2 --no-audit --no-fund
          npx vitest run

      - name: Silent-failure gate (no empty catch/.catch in critical paths; annotate deliberate ones)
        run: npm run check:silent
