name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies (npm install — repo has no lockfile; matches Vercel)
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest via npx — not a package dep, keeps npm ci/lockfile clean)
        run: npx --yes vitest@^2 run

      - name: Silent-failure gate (no empty catch/.catch in critical paths; annotate deliberate ones)
        run: npm run check:silent
