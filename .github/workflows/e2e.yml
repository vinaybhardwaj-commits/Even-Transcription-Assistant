name: E2E
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * *"   # daily 02:00 UTC (~07:30 IST) — before clinic
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install Playwright (ephemeral — not a committed dep, keeps Vercel npm ci clean)
        run: |
          npm i -D @playwright/test@^1.48 --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: Run e2e
        env:
          BASE_URL: ${{ vars.E2E_BASE_URL || 'https://www.evenscribe.app' }}
          PLAYWRIGHT_DOCTOR_SLUG: ${{ vars.E2E_DOCTOR_SLUG || 'dr-vinay-bhardwaj-cjzs' }}
          PLAYWRIGHT_DOCTOR_PIN: ${{ secrets.E2E_DOCTOR_PIN }}
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: playwright-report, path: playwright-report/, retention-days: 7 }
